<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent - EV Spot System</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f8faff;
    text-align: center;
    padding: 100px 20px;
  }
  .box {
    background: #fff;
    max-width: 500px;
    margin: auto;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  }
  h1 {
    color: #0077cc;
    margin-bottom: 15px;
  }
  p {
    color: #333;
    font-size: 1.1rem;
  }
  a {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #0077cc;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    transition: background 0.3s;
  }
  a:hover { background: #005fa3; }
</style>
</head>
<body>
  <div class="box">
    <h1>✅ Message Sent Successfully!</h1>
