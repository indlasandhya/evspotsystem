<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout - EV Spot System</title>
<style>
  /* Reset and Body */
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* Floating Background Animation */
  .background-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: float 15s infinite ease-in-out;
  }
  .circle1 { width: 300px; height: 300px; background: #00f2fe; top: -100px; left: -150px; }
  .circle2 { width: 200px; height: 200px; background: #4facfe; top: 50%; left: 80%; }
  .circle3 { width: 400px; height: 400px; background: #0072ff; bottom: -150px; right: -200px; }

  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-40px) rotate(45deg); }
  }

  /* Logout Container */
  .logout-container {
    position: relative;
    z-index: 2;
    text-align: center;
    background: rgba(0,0,0,0.4);
    padding: 50px 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    max-width: 500px;
    width: 90%;
    animation: fadeIn 1s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logout-container h1 {
    font-size: 3rem;
    margin-bottom: 20px;
    color: #fff;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
  }
  .logout-container p {
    font-size: 1.3rem;
    margin-bottom: 30px;
    color: #e0f7fa;
  }
  .logout-container button {
    padding: 15px 40px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #49e86f, #0f3057);
    color: #fff;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  .logout-container button:hover {
    transform: translateY(-3px) scale(1.05);
    background: linear-gradient(135deg, #0f3057, #49e86f);
    box-shadow: 0 12px 25px rgba(0,0,0,0.4);
  }

  /* Responsive */
  @media (max-width: 600px){
    .logout-container h1 { font-size: 2rem; }
    .logout-container p { font-size: 1rem; }
    .logout-container button { padding: 12px 25px; font-size: 1rem; }
  }
</style>
</head>
<body>

<!-- Animated Background Circles -->
<div class="background-circle circle1"></div>
<div class="background-circle circle2"></div>
<div class="background-circle circle3"></div>

<!-- Logout Section -->
<div class="logout-container">
  <h1>✅ Successfully Logged Out</h1>
  <p>Thank you for using EV Spot System. You have been safely logged out.</p>
  <button onclick="window.location.href='index.html'">Go to home</button>
</div>

</body>
</html>
